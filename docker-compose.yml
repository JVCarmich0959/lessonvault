

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: lessonvault
      POSTGRES_PASSWORD: lessonvault
      POSTGRES_DB: lessonvault
    ports:
      - "5432:5432"
    volumes:
      - lessonvault_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lessonvault"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    environment:
      DATABASE_URL: postgresql+psycopg://lessonvault:lessonvault@db:5432/lessonvault
      JWT_SECRET: "dev-only-change-me"
      JWT_ALG: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "120"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  lessonvault_pg:
